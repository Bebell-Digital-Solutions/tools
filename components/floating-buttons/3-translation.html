<!-- LANGUAGE FLOATING BUTTON -->
<style>
  #lang-widget {
    position: fixed;
    top: 80px;
    right: 20px;
    /* Fixed dimensions to align the origin of all buttons */
    width: 50px;
    height: 50px;
    z-index: 9999;
    -webkit-tap-highlight-color: transparent; /* Removes default tap highlight on iOS/Android */
    user-select: none; /* Prevents accidental image highlighting on touch */
  }

  .lang-main {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    z-index: 2; /* Keeps main button above the options */
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    transition: transform 0.3s ease;
  }

  .lang-main img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }
  
  /* Optional: Rotates the main button slightly when active */
  #lang-widget.active .lang-main {
    transform: rotate(15deg) scale(1.05);
  }

  .lang-options {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1; /* Options start behind the main button */
  }

  .lang-option {
    position: absolute;
    top: 0;
    left: 0;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: block;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    /* Start collapsed in the center */
    transform: translate(0, 0) scale(0.5);
    /* Bouncy spring effect */
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }

  .lang-option img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }

  /* --- ACTIVE STATE: THE ARC POSITIONING --- */
  #lang-widget.active .lang-option {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  /* Top-left Arc Position */
  #lang-widget.active .lang-option:nth-child(1) {
    transform: translate(-75px, -65px) scale(1);
    transition-delay: 0.1s; /* Staggered animation */
  }

  /* Middle-left Arc Position */
  #lang-widget.active .lang-option:nth-child(2) {
    transform: translate(-100px, 0px) scale(1);
    transition-delay: 0.05s;
  }

  /* Bottom-left Arc Position */
  #lang-widget.active .lang-option:nth-child(3) {
    transform: translate(-75px, 65px) scale(1);
    transition-delay: 0s;
  }

  /* --- DESKTOP HOVER SUPPORT --- */
  @media (hover: hover) {
    #lang-widget:hover .lang-main {
      transform: rotate(15deg) scale(1.05);
    }
    
    #lang-widget:hover .lang-option {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    #lang-widget:hover .lang-option:nth-child(1) {
      transform: translate(-75px, -65px) scale(1);
      transition-delay: 0.1s;
    }

    #lang-widget:hover .lang-option:nth-child(2) {
      transform: translate(-100px, 0px) scale(1);
      transition-delay: 0.05s;
    }

    #lang-widget:hover .lang-option:nth-child(3) {
      transform: translate(-75px, 65px) scale(1);
      transition-delay: 0s;
    }
  }
</style>

<div id="lang-widget">
  
  <!-- Main button -->
  <div class="lang-main" id="langToggle">
    <img src="https://bucket.mlcdn.com/a/3336/3336910/images/ccef8764150f346d9ced7b9255f19bad1ca67498.png" alt="Language">
  </div>

  <!-- Options -->
  <div class="lang-options">
    
    <a href="https://usuario.tarjeta-digital.site/incorp-001" class="lang-option">
      <img src="https://bucket.mlcdn.com/a/3336/3336910/images/2a2015de3de6179da8f920cd265146636a76b469.png" alt="Español">
    </a>

    <a href="https://usuario.tarjeta-digital.site/incorp-en-001" class="lang-option">
      <img src="https://bucket.mlcdn.com/a/3336/3336910/images/050703a1a818733ee85b103a6a8c4ea5180ade19.png" alt="English">
    </a>

    <a href="https://usuario.tarjeta-digital.site/incorp-tr-001" class="lang-option">
      <img src="https://bucket.mlcdn.com/a/3336/3336910/images/ed5b81f3a0ab0272a670c583b223c98eab0b12a6.png" alt="Türkçe">
    </a>

  </div>
</div>

<script>
  var widget = document.getElementById("lang-widget");
  var toggleBtn = document.getElementById("langToggle");

  toggleBtn.addEventListener("click", function (e) {
    e.preventDefault(); // Prevents jump if clicked rapidly
    e.stopPropagation(); // Prevents the document listener from instantly closing it
    widget.classList.toggle("active");
  });
  
  // Close widget if user taps/clicks outside of it
  document.addEventListener("click", function(e) {
    if (!widget.contains(e.target) && widget.classList.contains("active")) {
      widget.classList.remove("active");
    }
  });

  // Mobile enhancement: auto-close widget when the user scrolls the page
  window.addEventListener("scroll", function() {
    if (widget.classList.contains("active")) {
      widget.classList.remove("active");
    }
  }, { passive: true });
</script>
